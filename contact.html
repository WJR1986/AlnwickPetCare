<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content />
    <meta name="author" content />
    <title>Alnwick Pet Care - Contact</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <!-- Custom Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap icons-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="CSS/styles.css" rel="stylesheet" />
    <script src="JS/bootstrap.bundle.min.js"></script>
    <script
    src="https://kit.fontawesome.com/17e7e77638.js"
    crossorigin="anonymous"
  ></script>
  </head>
  <body
    class="d-flex flex-column h-100"
    style="background-image: url(assets/APCGreenBG.png); background-size: cover"
  >
    <main class="flex-shrink-0">
      <!-- Navigation-->
      <nav
        class="navbar navbar-expand-md navbar-dark bg-navbar mb-4 fw-bolder shadow"
      >
        <div class="container">
          <a class="navbar-brand mob-brand" href="index.html">
            <img
              src="assets/GreenLogo2.png"
              class="mob-brand logo-style"
              alt=""
            />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarCollapse"
            aria-controls="navbarCollapse"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-3 mb-md-0 navbar-menu-dir">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="services.html">Services</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="FAQ.html">FAQs</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="#">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!-- Page content-->

      <div class="container form-margin mob-form-margin px-5 my-5">
        <div class="card shadow border-0 rounded-4 mb-5 p-3">
          <div
            class="card-body p-0 rounded-4"
            style="
              background-image: url(assets/wallpaper-greentint.png);
              opacity: 0.6;
            "
          >
            <div
              class="form-container text-center fw-bolder text-black mob-form-margin"
            >
              <script type="text/javascript">
                var submitted = false;
              </script>
              <iframe
                frameborder="0"
                name="hiddenConfirm"
                id="hiddenConfirm"
                style="display: none"
                onload="if(submitted){window.location='formSubmitScreen.html';}"
              ></iframe>
              <h2 class="form-header text-black">Contact Me</h2>
              <form
                action="https://docs.google.com/forms/d/e/1FAIpQLSc6zUmzXQL6XPHQUgfKijnhYjjo6J3et5DaN_rYnupBNl4muQ/formResponse"
                method="post"
                target="hiddenConfirm"
                onsubmit="submitted=true"
              >
                <label for="entry.2116052852">Name:</label> <br />
                <input type="text" id="name" name="entry.2116052852" required />

                <label for="entry.1558582620">Email Address:</label> <br />
                <input
                  type="email"
                  id="email"
                  name="entry.1558582620"
                  required
                />
                <br />

                <label for="entry.1060472253">Contact Number:</label> <br />
                <input
                  type="text"
                  id="contactNumber"
                  name="entry.1060472253"
                  required
                />

                <label for="entry.1618498056">Message:</label> <br />
                <textarea
                  id="message"
                  name="entry.1618498056"
                  required
                ></textarea>
                <br />

                <input type="submit" value="Submit" />
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="container form-margin mob-form-margin px-5 my-5">
        <div class="d-flex justify-content-center fs-1 gap-4 ">
          <div class="card border-0  shadow ">
            <div class="card-body rounded-4" style="background-color: #C7E9B0">
              <a class="text-gradient" href="#!"
                ><i class="fa-brands fa-square-facebook fa-l"></i></a>
              <a class="text-gradient" href="#!"
                ><i class="fa-brands fa-wordpress fa-l"></i></a>
            </div>
          </div>
        </div>
                  
      </div>
    </main>

    <footer class="footer-color py-4 mt-auto">
      <div class="container px-5">
        <div
          class="row align-items-center justify-content-between flex-column flex-sm-row"
        >
          <div class="col-auto">
            <div class="small m-0">Copyright &copy; Alnwick Pet Care 2023</div>
          </div>
          <div class="col-auto">
            <a class="small footer-color" href="#!">Privacy</a>
            <span class="mx-1">&middot;</span>
            <a
              class="small footer-color"
              href="documents/tandcs.pdf"
              target="_blank"
              >Terms</a
            >
            <span class="mx-1">&middot;</span>
            <a class="small footer-color" href="contact.html">Contact</a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
